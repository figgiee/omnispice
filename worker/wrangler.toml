name = "omnispice-api"
main = "src/index.ts"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "omnispice-db"
database_id = "PLACEHOLDER_REPLACE_WITH_ACTUAL_ID"

[[r2_buckets]]
binding = "CIRCUIT_BUCKET"
bucket_name = "omnispice-circuits"

[vars]
CLERK_PUBLISHABLE_KEY = "pk_test_placeholder"
# CLERK_SECRET_KEY must be set via: wrangler secret put CLERK_SECRET_KEY
# Never put the secret key in wrangler.toml or version control.
